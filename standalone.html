<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Control 🔥</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{--bg-primary:#0a0a0f;--bg-secondary:#12121a;--bg-tertiary:#1a1a2e;--bg-card:#16161f;--border:#2a2a3e;--text-primary:#e4e4e7;--text-secondary:#a1a1aa;--text-muted:#71717a;--accent:#6366f1;--success:#22c55e;--warning:#f59e0b;--danger:#ef4444;--info:#3b82f6}
*{scrollbar-width:thin;scrollbar-color:var(--border) transparent;margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg-primary);color:var(--text-primary);font-family:system-ui,-apple-system,sans-serif}
.kanban-card{cursor:grab}.kanban-card:active{cursor:grabbing}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// ========== SIDEBAR ==========
function Sidebar({ page, setPage }) {
  const items = [
    { id: "dashboard", label: "Dashboard", icon: "📊" },
    { id: "tasks", label: "Tasks", icon: "✅" },
    { id: "calendar", label: "Calendar", icon: "📅" },
    { id: "projects", label: "Projects", icon: "📁" },
    { id: "memory", label: "Memory", icon: "🧠" },
    { id: "docs", label: "Docs", icon: "📄" },
    { id: "team", label: "Team", icon: "👥" },
    { id: "office", label: "Office", icon: "🏢" },
  ];
  return (
    <aside className="fixed left-0 top-0 h-screen w-52 flex flex-col border-r" style={{background:"var(--bg-secondary)",borderColor:"var(--border)"}}>
      <div className="flex items-center gap-2 px-4 py-4 border-b" style={{borderColor:"var(--border)"}}>
        <span className="text-xl">🔥</span>
        <span className="font-semibold text-sm tracking-wide" style={{color:"var(--text-primary)"}}>Mission Control</span>
      </div>
      <nav className="flex-1 px-2 py-3 space-y-0.5 overflow-y-auto">
        {items.map(item => (
          <button key={item.id} onClick={() => setPage(item.id)}
            className="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-sm transition-colors text-left"
            style={{background: page === item.id ? "var(--bg-tertiary)" : "transparent", color: page === item.id ? "var(--text-primary)" : "var(--text-secondary)"}}>
            <span>{item.icon}</span><span>{item.label}</span>
          </button>
        ))}
      </nav>
      <div className="px-3 py-3 border-t" style={{borderColor:"var(--border)"}}>
        <div className="flex items-center gap-2 px-3 py-2 text-sm" style={{color:"var(--text-secondary)"}}>
          👤 <span>Gustave</span>
        </div>
      </div>
    </aside>
  );
}

// ========== DASHBOARD ==========
function DashboardPage({ setPage }) {
  const stats = [
    { label: "Tasks", value: "0", sub: "In progress", icon: "✅", color: "#6366f1", page: "tasks" },
    { label: "Projects", value: "5", sub: "Active", icon: "📁", color: "#22c55e", page: "projects" },
    { label: "Memories", value: "1", sub: "Total", icon: "🧠", color: "#f59e0b", page: "memory" },
    { label: "Docs", value: "3", sub: "Created", icon: "📄", color: "#3b82f6", page: "docs" },
  ];
  const tools = [
    { id: "tasks", label: "Tasks", desc: "Kanban board for task management", icon: "✅" },
    { id: "calendar", label: "Calendar", desc: "Scheduled tasks and cron jobs", icon: "📅" },
    { id: "projects", label: "Projects", desc: "Track major projects and progress", icon: "📁" },
    { id: "memory", label: "Memory", desc: "Browse memories by day", icon: "🧠" },
    { id: "docs", label: "Docs", desc: "All documents, searchable", icon: "📄" },
    { id: "team", label: "Team", desc: "Agents, roles, and mission", icon: "👥" },
    { id: "office", label: "Office", desc: "Pixel art agent visualization", icon: "🏢" },
  ];
  return (
    <div className="max-w-6xl mx-auto space-y-8">
      <div>
        <h1 className="text-2xl font-bold" style={{color:"var(--text-primary)"}}>Mission Control 🔥</h1>
        <p className="text-sm mt-1" style={{color:"var(--text-secondary)"}}>Welcome back, Gustave. Here's your command center.</p>
      </div>
      <div className="grid grid-cols-4 gap-4">
        {stats.map(s => (
          <div key={s.label} onClick={() => setPage(s.page)} className="rounded-xl p-4 border cursor-pointer transition-colors hover:opacity-80" style={{background:"var(--bg-card)",borderColor:"var(--border)"}}>
            <div className="text-lg mb-2">{s.icon}</div>
            <div className="text-2xl font-bold" style={{color:"var(--text-primary)"}}>{s.value}</div>
            <div className="text-xs mt-0.5" style={{color:"var(--text-muted)"}}>{s.sub}</div>
          </div>
        ))}
      </div>
      <div>
        <h2 className="text-sm font-medium mb-4" style={{color:"var(--text-secondary)"}}>Tools</h2>
        <div className="grid grid-cols-3 gap-4">
          {tools.map(t => (
            <div key={t.id} onClick={() => setPage(t.id)} className="rounded-xl p-5 border cursor-pointer transition-all hover:scale-[1.01]" style={{background:"var(--bg-card)",borderColor:"var(--border)"}}>
              <div className="text-xl mb-3">{t.icon}</div>
              <div className="font-medium text-sm" style={{color:"var(--text-primary)"}}>{t.label}</div>
              <div className="text-xs mt-1" style={{color:"var(--text-muted)"}}>{t.desc}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ========== TASKS ==========
function TasksPage() {
  const columns = [
    { id: "recurring", label: "Recurring", color: "#ef4444" },
    { id: "backlog", label: "Backlog", color: "#f59e0b" },
    { id: "in-progress", label: "In Progress", color: "#3b82f6" },
    { id: "review", label: "Review", color: "#f97316" },
    { id: "done", label: "Done", color: "#22c55e" },
  ];
  const [tasks, setTasks] = useState([
    { id: "1", title: "Set up project infrastructure", desc: "Initialize repos, CI/CD, deployment", assignee: "Optimus", col: "done", time: "2h ago" },
    { id: "2", title: "Design system components", desc: "Build reusable UI component library", assignee: "Gustave", col: "backlog", time: "1h ago" },
  ]);
  const [showNew, setShowNew] = useState(false);
  const [newT, setNewT] = useState({ title: "", desc: "", assignee: "Gustave" });
  const [dragged, setDragged] = useState(null);

  const addTask = () => {
    if (!newT.title.trim()) return;
    setTasks([...tasks, { id: Date.now().toString(), title: newT.title, desc: newT.desc, assignee: newT.assignee, col: "backlog", time: "just now" }]);
    setNewT({ title: "", desc: "", assignee: "Gustave" }); setShowNew(false);
  };

  const total = tasks.length, inProg = tasks.filter(t => t.col === "in-progress").length, done = tasks.filter(t => t.col === "done").length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;

  return (
    <div className="h-[calc(100vh-3rem)] flex flex-col">
      <div className="flex items-center justify-between mb-6">
        <div className="flex items-center gap-6">
          <div><span className="text-3xl font-bold" style={{color:"var(--text-primary)"}}>{total}</span><span className="text-xs ml-2" style={{color:"var(--text-muted)"}}>This week</span></div>
          <div><span className="text-3xl font-bold" style={{color:"var(--text-primary)"}}>{inProg}</span><span className="text-xs ml-2" style={{color:"var(--text-muted)"}}>In progress</span></div>
          <div><span className="text-3xl font-bold" style={{color:"var(--accent)"}}>{pct}%</span><span className="text-xs ml-2" style={{color:"var(--text-muted)"}}>Completion</span></div>
        </div>
        <button onClick={() => setShowNew(true)} className="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium text-white" style={{background:"var(--accent)"}}>+ New Task</button>
      </div>
      <div className="flex-1 flex gap-4 overflow-x-auto pb-4">
        {columns.map(col => {
          const ct = tasks.filter(t => t.col === col.id);
          return (
            <div key={col.id} className="flex-1 min-w-[200px] flex flex-col" onDragOver={e => e.preventDefault()} onDrop={() => { if (dragged) { setTasks(tasks.map(t => t.id === dragged ? { ...t, col: col.id } : t)); setDragged(null); } }}>
              <div className="flex items-center gap-2 mb-3">
                <div className="w-2 h-2 rounded-full" style={{background:col.color}}/>
                <span className="text-sm font-medium" style={{color:"var(--text-primary)"}}>{col.label}</span>
                <span className="text-xs px-1.5 py-0.5 rounded" style={{color:"var(--text-muted)",background:"var(--bg-tertiary)"}}>{ct.length}</span>
              </div>
              <div className="flex-1 space-y-2">
                {ct.map(task => (
                  <div key={task.id} draggable onDragStart={() => setDragged(task.id)} className="kanban-card rounded-lg p-3 border" style={{background:"var(--bg-card)",borderColor:"var(--border)"}}>
                    <div className="text-sm font-medium truncate" style={{color:"var(--text-primary)"}}>{task.title}</div>
                    <div className="text-xs mt-1 line-clamp-2" style={{color:"var(--text-muted)"}}>{task.desc}</div>
                    <div className="flex items-center justify-between mt-2">
                      <div className="flex items-center gap-1">
                        <div className="w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold text-white" style={{background: task.assignee === "Optimus" ? "var(--accent)" : "#22c55e"}}>{task.assignee[0]}</div>
                        <span className="text-[10px]" style={{color:"var(--text-muted)"}}>{task.assignee}</span>
                      </div>
                      <span className="text-[10px]" style={{color:"var(--text-muted)"}}>{task.time}</span>
                    </div>
                  </div>
                ))}
                {ct.length === 0 && <div className="text-center py-8 text-xs" style={{color:"var(--text-muted)"}}>No tasks</div>}
              </div>
            </div>
          );
        })}
        <div className="w-56 shrink-0 border-l pl-4" style={{borderColor:"var(--border)"}}>
          <h3 className="text-sm font-medium mb-3" style={{color:"var(--text-primary)"}}>Live Activity</h3>
          <div className="text-xs" style={{color:"var(--text-muted)"}}>
            <div className="flex items-center gap-1.5 mb-1"><div className="w-4 h-4 rounded-full flex items-center justify-center text-[8px] font-bold text-white" style={{background:"var(--accent)"}}>O</div><span className="font-medium" style={{color:"var(--text-primary)"}}>Optimus</span></div>
            <div className="ml-5" style={{color:"var(--text-muted)"}}>Mission Control dashboard created</div>
            <div className="ml-5 text-[10px] mt-0.5" style={{color:"var(--text-muted)"}}>just now</div>
          </div>
        </div>
      </div>
      {showNew && (
        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50">
          <div className="w-full max-w-md rounded-xl p-6 border" style={{background:"var(--bg-secondary)",borderColor:"var(--border)"}}>
            <h3 className="text-lg font-semibold mb-4" style={{color:"var(--text-primary)"}}>New Task</h3>
            <div className="space-y-3">
              <input type="text" placeholder="Task title" value={newT.title} onChange={e => setNewT({...newT, title: e.target.value})} className="w-full px-3 py-2 rounded-lg text-sm border outline-none" style={{background:"var(--bg-tertiary)",borderColor:"var(--border)",color:"var(--text-primary)"}}/>
              <textarea placeholder="Description" value={newT.desc} onChange={e => setNewT({...newT, desc: e.target.value})} rows={3} className="w-full px-3 py-2 rounded-lg text-sm border outline-none resize-none" style={{background:"var(--bg-tertiary)",borderColor:"var(--border)",color:"var(--text-primary)"}}/>
              <select value={newT.assignee} onChange={e => setNewT({...newT, assignee: e.target.value})} className="w-full px-3 py-2 rounded-lg text-sm border outline-none" style={{background:"var(--bg-tertiary)",borderColor:"var(--border)",color:"var(--text-primary)"}}>
                <option value="Gustave">Gustave</option><option value="Optimus">Optimus Prime</option>
              </select>
            </div>
            <div className="flex justify-end gap-2 mt-5">
              <button onClick={() => setShowNew(false)} className="px-4 py-2 rounded-lg text-sm" style={{color:"var(--text-secondary)"}}>Cancel</button>
              <button onClick={addTask} className="px-4 py-2 rounded-lg text-sm font-medium text-white" style={{background:"var(--accent)"}}>Create Task</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ========== CALENDAR ==========
function CalendarPage() {
  const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const today = new Date();
  const start = new Date(today); start.setDate(today.getDate() - today.getDay());
  const week = Array.from({length:7}, (_, i) => { const d = new Date(start); d.setDate(start.getDate() + i); return d; });
  const tasks = [
    { title: "Morning Review", time: "8:00 AM", color: "#6366f1" },
    { title: "Task Sync", time: "9:00 AM", color: "#22c55e" },
    { title: "Evening Wrap", time: "9:00 PM", color: "#f59e0b" },
  ];
  return (
    <div className="max-w-6xl mx-auto space-y-6">
      <div><h1 className="text-xl font-bold" style={{color:"var(--text-primary)"}}>Scheduled Tasks</h1><p className="text-sm mt-1" style={{color:"var(--text-muted)"}}>Your automated routines</p></div>
      <div className="flex items-center gap-2">
        <span style={{color:"var(--warning)"}}>⚡</span>
        <span className="text-sm font-medium" style={{color:"var(--text-primary)"}}>Always Running</span>
        <span className="px-3 py-1.5 rounded-lg text-xs border ml-3" style={{background:"var(--bg-card)",borderColor:"var(--border)",color:"var(--text-secondary)"}}>Heartbeat Check • Every 30 min</span>
        <span className="px-3 py-1.5 rounded-lg text-xs border" style={{background:"var(--bg-card)",borderColor:"var(--border)",color:"var(--text-secondary)"}}>Memory Sync • On change</span>
      </div>
      <div className="text-sm font-medium" style={{color:"var(--text-primary)"}}>{today.toLocaleDateString("en-US",{month:"long",year:"numeric"})}</div>
      <div className="grid grid-cols-7 gap-3">
        {week.map(date => {
          const isToday = date.toDateString() === today.toDateString();
          return (
            <div key={date.toISOString()} className="space-y-2">
              <div className="text-center pb-2 border-b" style={{borderColor:"var(--border)"}}>
                <div className="text-xs" style={{color:"var(--text-muted)"}}>{days[date.getDay()]}</div>
                <div className="text-lg font-semibold mt-0.5" style={{color: isToday ? "var(--accent)" : "var(--text-primary)"}}>{date.getDate()}</div>
              </div>
              <div className="space-y-1.5">
                {tasks.map((t, i) => (
                  <div key={i} className="rounded-lg px-2.5 py-2 text-xs border-l-2" style={{background:"var(--bg-card)",borderLeftColor:t.color}}>
                    <div className="font-medium truncate" style={{color:"var(--text-primary)"}}>{t.title}</div>
                    <div className="mt-0.5" style={{color:"var(--text-muted)"}}>{t.time}</div>
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ========== PROJECTS ==========
function ProjectsPage() {
  const projects = [
    { title: "Mission Control Dashboard", desc: "Central dashboard for task management, memory, docs, and agent coordination.", status: "active", progress: 30, tasks: "3/10", assignee: "Optimus", priority: "high" },
    { title: "SaaS MVP", desc: "Validate idea, build MVP, and launch first micro-SaaS product.", status: "planning", progress: 0, tasks: "0/0", assignee: "Gustave", priority: "high" },
    { title: "BIM Automation Tools", desc: "Build automation scripts and tools for BIM workflows.", status: "planning", progress: 0, tasks: "0/0", assignee: "Gustave", priority: "medium" },
    { title: "Health & Fitness System", desc: "Structured workout tracking, nutrition planning, accountability.", status: "planning", progress: 0, tasks: "0/0", assignee: "Gustave", priority: "medium" },
    { title: "Crypto Portfolio Strategy", desc: "Research, track, and optimize crypto investment strategy.", status: "planning", progress: 0, tasks: "0/0", assignee: "Optimus", priority: "medium" },
  ];
  const sc = { active: "#22c55e", planning: "#3b82f6", paused: "#f59e0b" };
  const pc = { high: "#ef4444", medium: "#f59e0b", low: "#22c55e" };
  return (
    <div className="max-w-6xl mx-auto space-y-6">
      <div className="flex items-center justify-between">
        <div className="flex items-center gap-3">
          <span className="text-xl">📁</span>
          <div><h1 className="text-xl font-bold" style={{color:"var(--text-primary)"}}>Projects</h1><p className="text-sm" style={{color:"var(--text-muted)"}}>{projects.length} total</p></div>
        </div>
        <button className="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium text-white" style={{background:"var(--accent)"}}>+ New Project</button>
      </div>
      <div className="grid grid-cols-2 gap-4">
        {projects.map((p, i) => (
          <div key={i} className="rounded-xl p-5 border" style={{background:"var(--bg-card)",borderColor:"var(--border)"}}>
            <div className="flex items-start justify-between mb-3">
              <h3 className="text-sm font-semibold" style={{color:"var(--text-primary)"}}>{p.title}</h3>
              <span className="px-2 py-0.5 rounded text-[10px] font-medium capitalize" style={{background:`${sc[p.status]}20`,color:sc[p.status]}}>{p.status}</span>
            </div>
            <p className="text-xs mb-4" style={{color:"var(--text-muted)"}}>{p.desc}</p>
            <div className="mb-3">
              <div className="flex items-center justify-between mb-1"><span className="text-[10px]" style={{color:"var(--text-muted)"}}>{p.progress}%</span><span className="text-[10px]" style={{color:"var(--text-muted)"}}>{p.tasks}</span></div>
              <div className="h-1.5 rounded-full" style={{background:"var(--bg-tertiary)"}}><div className="h-full rounded-full" style={{width:`${p.progress}%`,background:sc[p.status]}}/></div>
            </div>
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-1.5"><div className="w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold text-white" style={{background:p.assignee==="Optimus"?"var(--accent)":"#22c55e"}}>{p.assignee[0]}</div><span className="text-[10px]" style={{color:"var(--text-muted)"}}>{p.assignee}</span></div>
              <span className="px-1.5 py-0.5 rounded text-[10px] font-medium" style={{background:`${pc[p.priority]}20`,color:pc[p.priority]}}>{p.priority}</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ========== MEMORY ==========
function MemoryPage() {
  const entry = { date: "2026-03-04", title: "First Boot", content: "Came online. Connected Telegram. Gustave defined identity and operating principles. Mission Control dashboard build started. Set up Optimus Prime as life improvement strategist, coach, business developer, coding partner, and execution engine." };
  return (
    <div className="h-[calc(100vh-3rem)] flex">
      <div className="w-72 shrink-0 border-r flex flex-col" style={{borderColor:"var(--border)"}}>
        <div className="p-3"><div className="flex items-center gap-2 px-3 py-2 rounded-lg border" style={{background:"var(--bg-tertiary)",borderColor:"var(--border)"}}><span style={{color:"var(--text-muted)"}}>🔍</span><span className="text-sm" style={{color:"var(--text-muted)"}}>Search memory...</span></div></div>
        <div className="px-3 mb-2"><div className="flex items-center gap-2 px-3 py-2.5 rounded-lg" style={{background:"var(--bg-card)"}}><span style={{color:"var(--accent)"}}>🧠</span><div><div className="text-sm font-medium" style={{color:"var(--text-primary)"}}>Long-Term Memory ⭐</div><div className="text-[10px]" style={{color:"var(--text-muted)"}}>Just created</div></div></div></div>
        <div className="px-3 mb-2"><div className="text-xs font-medium" style={{color:"var(--text-secondary)"}}>📅 DAILY JOURNAL — 1 entry</div></div>
        <div className="px-3"><button className="w-full text-left px-3 py-2 rounded-lg" style={{background:"var(--bg-tertiary)"}}>
          <div className="flex items-center gap-1.5"><span className="text-xs" style={{color:"var(--text-muted)"}}>📅</span><span className="text-xs font-medium" style={{color:"var(--text-primary)"}}>Wed, Mar 4</span></div>
          <div className="text-[10px] mt-0.5 ml-5" style={{color:"var(--text-muted)"}}>0.8 KB • 42 words</div>
        </button></div>
      </div>
      <div className="flex-1 p-6">
        <h1 className="text-lg font-bold mb-1" style={{color:"var(--text-primary)"}}>{entry.date} — {entry.title}</h1>
        <p className="text-xs mb-6" style={{color:"var(--text-muted)"}}>Wednesday, March 4, 2026</p>
        <div className="text-sm leading-relaxed whitespace-pre-wrap" style={{color:"var(--text-secondary)"}}>{entry.content}</div>
      </div>
    </div>
  );
}

// ========== DOCS ==========
function DocsPage() {
  const docs = [
    { name: "SOUL.md", cat: "Docs", content: "Identity and operating principles for Optimus Prime. Casual but precise. Smart, efficient..." },
    { name: "USER.md", cat: "Docs", content: "Profile for Gustave. Black architect, BIM specialist, software developer..." },
    { name: "IDENTITY.md", cat: "Docs", content: "Agent identity record. Name: Optimus Prime. Emoji: 🔥" },
  ];
  const [sel, setSel] = useState(null);
  return (
    <div className="h-[calc(100vh-3rem)] flex">
      <div className="w-72 shrink-0 border-r flex flex-col" style={{borderColor:"var(--border)"}}>
        <div className="p-3"><div className="flex items-center gap-2 px-3 py-2 rounded-lg border" style={{background:"var(--bg-tertiary)",borderColor:"var(--border)"}}><span style={{color:"var(--text-muted)"}}>🔍</span><span className="text-sm" style={{color:"var(--text-muted)"}}>Search documents...</span></div></div>
        <div className="flex-1 overflow-y-auto px-3 space-y-1">
          {docs.map((d, i) => (
            <button key={i} onClick={() => setSel(d)} className="w-full text-left px-3 py-2.5 rounded-lg" style={{background: sel?.name === d.name ? "var(--bg-tertiary)" : "transparent"}}>
              <div className="flex items-center gap-2"><span style={{color:"var(--accent)"}}>📄</span><span className="text-xs font-medium truncate" style={{color:"var(--text-primary)"}}>{d.name}</span></div>
              <span className="ml-5 px-1.5 py-0.5 rounded text-[9px]" style={{background:"var(--bg-tertiary)",color:"var(--text-muted)"}}>{d.cat}</span>
            </button>
          ))}
        </div>
      </div>
      <div className="flex-1 p-6">
        {sel ? (<div><h1 className="text-lg font-bold mb-4" style={{color:"var(--text-primary)"}}>{sel.name}</h1><div className="text-sm leading-relaxed" style={{color:"var(--text-secondary)"}}>{sel.content}</div></div>)
        : (<div className="flex items-center justify-center h-full"><p className="text-sm" style={{color:"var(--text-muted)"}}>Select a document to view</p></div>)}
      </div>
    </div>
  );
}

// ========== TEAM ==========

      <div className="text-center"><h1 className="text-2xl font-bold" style={{color:"var(--text-primary)"}}>Meet the Team</h1></div>

        {team.map(m => (
          <div key={m.name} className="rounded-xl p-6 border" style={{background:"var(--bg-card)",borderColor:"var(--border)"}}>
            <div className="flex items-start gap-4">
              <div className="w-12 h-12 rounded-xl flex items-center justify-center text-lg font-bold text-white shrink-0" style={{background:m.color}}>{m.init}</div>
              <div>

                <div className="text-sm font-medium mt-0.5" style={{color:m.color}}>{m.role}</div>
                <p className="text-xs mt-2" style={{color:"var(--text-secondary)"}}>{m.desc}</p>
                <div className="flex gap-2 mt-3">{m.tags.map(t => <span key={t} className="px-2 py-0.5 rounded text-[10px]" style={{background:"var(--bg-tertiary)",color:"var(--text-muted)"}}>{t}</span>)}</div>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>

}

// ========== OFFICE ==========
function OfficePage() {
  const [agents, setAgents] = useState([
    { name: "Gustave", emoji: "👨🏿‍💻", color: "#22c55e", x: 3, y: 2, status: "working" },
    { name: "Optimus", emoji: "🔥", color: "#6366f1", x: 6, y: 2, status: "working" },
  ]);
  useEffect(() => {
    const iv = setInterval(() => {
      setAgents(prev => prev.map(a => {
        if (Math.random() > 0.7) {
          return { ...a, x: Math.max(0, Math.min(11, a.x + (Math.random() > 0.5 ? 1 : -1))), y: Math.max(0, Math.min(7, a.y + (Math.random() > 0.5 ? 1 : -1))) };
        }
        return a;
      }));
    }, 3000);
    return () => clearInterval(iv);
  }, []);
  const CELL = 64;
  const furniture = [
    { x:2,y:2,w:2,h:1,icon:"🖥️" },{ x:5,y:2,w:2,h:1,icon:"🖥️" },{ x:8,y:2,w:2,h:1,icon:"🖥️" },
    { x:10,y:5,w:1,h:1,icon:"🚰" },{ x:0,y:0,w:1,h:1,icon:"🌿" },{ x:11,y:0,w:1,h:1,icon:"🌿" },
    { x:4,y:0,w:4,h:1,icon:"📋" },
  ];
  return (
    <div className="max-w-5xl mx-auto space-y-6">
      <div className="flex items-center gap-3"><span className="text-xl">🏢</span><div><h1 className="text-xl font-bold" style={{color:"var(--text-primary)"}}>The Office</h1><p className="text-sm" style={{color:"var(--text-muted)"}}>Real-time agent activity</p></div></div>
      <div className="rounded-xl border overflow-hidden relative" style={{background:"#0d0d14",borderColor:"var(--border)",width:12*CELL,height:8*CELL}}>
        {furniture.map((f, i) => (
          <div key={i} className="absolute rounded-lg flex items-center justify-center" style={{left:f.x*CELL+4,top:f.y*CELL+4,width:f.w*CELL-8,height:f.h*CELL-8,background:"rgba(42,42,62,0.3)",border:"1px solid rgba(42,42,62,0.5)"}}>{f.icon}</div>
        ))}
        {agents.map(a => (
          <div key={a.name} className="absolute flex flex-col items-center transition-all duration-1000" style={{left:a.x*CELL,top:a.y*CELL,width:CELL,height:CELL}}>
            <div className="text-2xl">{a.emoji}</div>
            <span className="text-[9px] font-medium mt-0.5" style={{color:a.color}}>{a.name}</span>
            <div className="w-1.5 h-1.5 rounded-full mt-0.5" style={{background:"#22c55e"}}/>
          </div>
        ))}
      </div>
      <div className="flex gap-3">
        {agents.map(a => (
          <div key={a.name} className="flex-1 rounded-xl p-3 border" style={{background:"var(--bg-card)",borderColor:"var(--border)"}}>
            <div className="flex items-center gap-2"><span className="text-lg">{a.emoji}</span><div><div className="text-sm font-medium" style={{color:"var(--text-primary)"}}>{a.name}</div><div className="text-[10px]" style={{color:"var(--success)"}}>working</div></div></div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ========== APP ==========
function App() {
  const [page, setPage] = useState("dashboard");
  const pages = {
    dashboard: <DashboardPage setPage={setPage} />,
    tasks: <TasksPage />,
    calendar: <CalendarPage />,
    projects: <ProjectsPage />,
    memory: <MemoryPage />,
    docs: <DocsPage />,
    team: <TeamPage />,
    office: <OfficePage />,
  };
  return (
    <div>
      <Sidebar page={page} setPage={setPage} />
      <main className="ml-52 min-h-screen p-6">{pages[page]}</main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
